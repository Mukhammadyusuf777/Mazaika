version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mazaika-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mazaika_user
      POSTGRES_PASSWORD: mazaika_password
      POSTGRES_DB: mazaika
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mazaika_user -d mazaika"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mazaika-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
